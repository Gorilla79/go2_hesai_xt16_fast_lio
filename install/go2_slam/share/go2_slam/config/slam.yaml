slam_toolbox:
  ros__parameters:
    mode: mapping

    # Frames
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    # Scan
    scan_topic: /scan
    use_scan_matching: true

    # Map
    resolution: 0.05
    max_laser_range: 30.0

    # Performance
    throttle_scans: 1
    transform_timeout: 0.2

    # Debug
    enable_interactive_mode: false
