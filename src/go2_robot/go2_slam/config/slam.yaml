slam_toolbox:
  ros__parameters:
    mode: mapping

    # Frames
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    # Scan
    scan_topic: /scan
    use_scan_matching: true

    # Map
    resolution: 0.05
    max_laser_range: 30.0

    # Performance
    throttle_scans: 1
    transform_timeout: 0.2
    # Map publish/update behavior (made more frequent for live testing)
    # map_update_interval: how often (s) the map is updated/published (default can be large)
    map_update_interval: 1.0
    # Controls to force SLAM to consider scans immediately for updating the map
    minimum_travel_distance: 0.0
    minimum_time_interval: 0.0

    # Debug
    enable_interactive_mode: false
